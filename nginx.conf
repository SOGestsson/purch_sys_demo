server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy: /sim-proxy -> https://api.nostradamus-api.com
  location /sim-proxy/ {
    proxy_pass https://api.nostradamus-api.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host api.nostradamus-api.com;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Proxy: /pipeline-proxy -> https://pipeline-demo.nostradamus-api.com
  location /pipeline-proxy/ {
    proxy_pass https://pipeline-demo.nostradamus-api.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host pipeline-demo.nostradamus-api.com;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
